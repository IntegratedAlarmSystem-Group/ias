name: ias-build-test-install
run-name: ${{ github.actor }} Build IAS
on: [push]
env:
  IAS_ROOT: '/home/runner/work/ias/ias/IasRoot'
jobs:
  Build-IAS:
    runs-on: ubuntu-latest
    outputs:
      ias_root_path: ${{ steps.set-env.outputs.IAS_ROOT }}
    steps:
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Python
        uses: actions/setup-python@v4.5.0
        with:
          python-version: '3.10'
      - run: python --version
      - name: Install python tools
        run: |
          pip install --upgrade pip
          pip install PySide6 jep python-dateutil pytest confluent-kafka
      - run: java -version
      - run: mkdir -p $IAS_ROOT
      - name: Checkout IAS code
        uses: actions/checkout@v4
        with:
          path: GIT
      - run: ls
      - name: Clean
        working-directory: GIT
        run: ./gradlew clean
      - name: Build and unit test IAS with gradlew
        working-directory: GIT
        run: ./gradlew build
      - name: Install IAS in IAS_ROOT
        working-directory: GIT
        run: ./gradlew install
      - name: List IAS_ROOT content
        run: ls -lR $IAS_ROOT
      - name: Create a tar archive of IAS_ROOT with preserved attributes
        run: tar -cvzf ias-root.tgz IasRoot
      - uses: actions/upload-artifact@v4
        with:
          name: ias-root.tgz
          path: ias-root.tgz
          retention-days: 7
          include-hidden-files: true
      - uses: actions/upload-artifact@v4
        with:
          name: unit-tests.out
          path: $HOME/unit-tests.out
          retention-days: 7
          include-hidden-files: true
